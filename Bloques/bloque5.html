titulo:"Tema 1: La economía colonial",
texto:`<p>La economía colonial en América surgió como resultado directo de la expansión europea iniciada a finales del siglo XV, un proceso que transformó radicalmente las estructuras económicas del mundo. Antes de la llegada de los europeos, la economía europea se encontraba en plena transición: el feudalismo, basado en la tierra y en relaciones de dependencia personal, comenzaba a debilitarse mientras crecían el comercio, las ciudades y las actividades mercantiles.</p>
<p>La actividad más importante fue la minería, especialmente de oro y plata, que se enviaban a Europa. Para trabajar en minas y haciendas se usaron distintos sistemas de trabajo: encomienda, mita, esclavitud africana y peonaje. También se desarrolló una agricultura orientada al mercado europeo, con plantaciones de azúcar, cacao, algodón y tabaco, mientras que las haciendas producían alimentos para el consumo interno.</p><div class="concepto-destacado">
Se analiza cómo la economía colonial sentó las bases de relaciones comerciales y la explotación de recursos.

<div class="bloque-economia">

Además, se abordan los cambios en la producción agrícola y artesanal,la expansión del comercio internacional y la aparición de nuevas formas de acumulación de riqueza.</p></div>

titulo:"Tema 2: Revolución Industrial",
texto:`<p>La Revolución Industrial fue un proceso histórico de transformación profunda que modificó las estructuras tecnológicas, económicas y sociales a partir del siglo XVIII. Este fenómeno se caracterizó por la incorporación de maquinaria, nuevas fuentes de energía y métodos de producción que reemplazaron progresivamente el trabajo manual y artesanal.</p>
<p>Entre sus principales consecuencias estuvieron el crecimiento de las ciudades industriales, la aparición de la clase obrera, la consolidación de la burguesía industrial y profundos cambios en las condiciones de trabajo y en la organización de la producción.</p>
<p>La Revolución Industrial marcó el inicio de la economía moderna y transformó de manera irreversible la vida cotidiana, la producción y las relaciones de poder en el mundo occidental.<p>Su desarrollo estuvo estrechamente vinculado a la acumulación de capital proveniente del comercio internacional y de las colonias, lo que permitió financiar innovaciones técnicas y la expansión del sistema fabril.</p>
<div class="concepto-destacado">Se exploran los cambios tecnológicos, económicos y sociales provocados por la Revolución Industrial.</div>

<h3 class="titulo-bonito">Transformaciones económicas</h3>
<p>El proceso industrial generó una profunda reconfiguración de la economía. La burguesía industrial se consolidó como clase dominante, controlando los medios de producción y acumulando capital. La expansión del sistema fabril impulsó un notable aumento de la productividad, lo que favoreció la creación de mercados nacionales e internacionales más dinámicos. Este fenómeno dio origen a una economía moderna basada en la producción en masa y en la circulación de bienes a gran escala.</p>
<img src="../IMAGEN/Transformaciones.png" class="img-pequena">
<p>Las transformaciones tecnológicas y económicas tuvieron un impacto directo en la sociedad. El crecimiento acelerado de las ciudades industriales atrajo a miles de trabajadores, generando procesos de urbanización sin precedentes. La aparición de la clase obrera estuvo marcada por duras condiciones laborales: largas jornadas, bajos salarios y estricta disciplina fabril. Al mismo tiempo, se produjo una reconfiguración de las relaciones de poder entre la burguesía y el proletariado, lo que sentó las bases para el surgimiento de movimientos sociales y demandas por derechos laborales</p>

<p>Tras el final de la Segunda Guerra Mundial en 1945, el mundo quedó dividido en dos grandes bloques de poder. Por un lado, Estados Unidos representaba el modelo capitalista basado en la economía de mercado, la propiedad privada y el sistema democrático. Por otro lado, la Unión Soviética defendía el modelo comunista, caracterizado por la economía planificada y el control estatal.</p>

titulo:"Tema 4: Escuelas económicas",
texto:`<div class="concepto-destacado">El mercantilismo, una de las primeras escuelas económicas, nació directamente de la economía colonial porque las metrópolis buscaban acumular oro y plata controlando estrictamente el comercio de sus colonias.</div>
<p>Las escuelas económicas surgieron precisamente como respuestas intelectuales a los cambios económicos que comenzaron en la época colonial. La expansión del comercio internacional, la explotación de recursos y la aparición de nuevas formas de acumulación de riqueza generaron preguntas sobre cómo debía organizarse la economía, qué papel debía tener el Estado y cómo se distribuía la riqueza. Estas transformaciones, descritas en la página adyacente, crearon el contexto histórico que dio origen a las primeras teorías económicas.</p>

<p>A partir de este punto surgieron nuevas corrientes, como el liberalismo, el marxismo y el keynesianismo, que intentaron explicar y orientar el funcionamiento de las economías modernas, influyendo de manera decisiva en las políticas públicas de distintos países. Estas escuelas no solo ofrecieron interpretaciones distintas sobre el papel del Estado, el mercado y la distribución de la riqueza, sino que también moldearon modelos de desarrollo, reformas económicas y decisiones gubernamentales a lo largo de los siglos XIX y XX. Gracias a estas corrientes, los Estados adoptaron políticas que iban desde la libertad absoluta de mercado hasta la intervención estatal para corregir desigualdades, lo que demuestra cómo el pensamiento económico se convirtió en una herramienta fundamental para comprender y dirigir la vida social y política de las naciones.</p>

const cont = document.getElementById("contenido");

function mostrar(){
  detenerAudio();

  document.getElementById("contador").innerText =
    `Tema ${i+1} de ${temas.length}`;

  cont.innerHTML = `
  <h2>${temas[i].titulo}</h2>

  <div style="text-align:center;margin-bottom:20px;">
    <button class="voz-btn" onclick="leer()">🔊 Leer</button>
    <button class="voz-btn" onclick="detenerAudio()">⏸ Pausar</button>
  </div>

  <div class="bloque-intro">
    <img class="img-principal" src="${temas[i].imagen}">
     </div>
  </div>

  <div style="white-space:pre-line;">
    ${temas[i].texto}
  </div>

  ${
    infoExtra[i] && infoExtra[i].length > 0
    ? `
     <div class="tarjetas-economistas">
  ${infoExtra[i].map((item,index)=>`
    <div class="tarjeta-economista economista-${index+1}">
      <h4>${item.titulo}</h4>
      <p>${item.texto}</p>
    </div>
  `).join("")}
</div>    `
    : ``
  }

  <div style="text-align:center;margin-top:20px;">
    <button class="voz-btn" onclick="verMapa('${temas[i].mapa}')">
      🧠 Ver mapa
    </button>

    ${
      i === 3
      ? `<button class="voz-btn" onclick="abrirQuiz()">📝 Quiz</button>`
      : ``
    }
  </div>
  `;

  // ACTIVAR PERSONAJES
  const personajes = document.querySelectorAll(".card-personaje");
  const imagen = document.getElementById("imagenPersonaje");

  personajes.forEach(personaje => {
    personaje.addEventListener("mouseenter", () => {
      imagen.src = personaje.getAttribute("data-img");
      imagen.style.display = "block";
    });

    personaje.addEventListener("mouseleave", () => {
      imagen.style.display = "none";
    });
  });
}

function detenerAudio(){
  speechSynthesis.cancel();
}

function leer(){
  voz.text = temas[i].texto;
  speechSynthesis.cancel();
  speechSynthesis.speak(voz);
}

function verMapa(src){
  document.getElementById("imgMapa").src=src;
  document.getElementById("modal").style.display="flex";
}

function cerrarMapa(){
  document.getElementById("modal").style.display="none";
}

function irTema(index){
  i = index;
  mostrar();
}
const quiz = {
  pregunta: "¿Qué escuela económica defendía la acumulación de oro y plata mediante el control del comercio colonial?",
  opciones: [
    "Liberalismo",
    "Mercantilismo",
    "Keynesianismo",
    "Marxismo"
  ],
  correcta: 1
};


function abrirQuiz(){

  generarPreguntas(); // vuelve a crear preguntas limpias

  document.getElementById("modalQuiz").style.display="flex";

  // 🔄 LIMPIAR RESPUESTAS
  document.querySelectorAll("input[type=radio]").forEach(radio=>{
    radio.checked = false;
    radio.disabled = false;
  });

  // 🔄 limpiar colores anteriores
  document.querySelectorAll("#preguntasQuiz label").forEach(label=>{
    label.style.color="";
    label.style.fontWeight="";
  });

  // 🔄 limpiar resultado actual
  document.getElementById("resultadoFinal").innerHTML="";

  // 📌 Mostrar nota anterior guardada
  let notaGuardada = localStorage.getItem("notaSeccion5");

  if(notaGuardada){
    document.getElementById("resultadoFinal").innerHTML =
      "📌 Última nota: " + notaGuardada;
  }
}


function cerrarQuiz(){
  document.getElementById("modalQuiz").style.display="none";
  document.getElementById("resultadoFinal").innerText="";
}

function generarPreguntas(){
  let contenedor = document.getElementById("preguntasQuiz");
  contenedor.innerHTML="";

  preguntas.forEach((p, index)=>{
    let bloque = document.createElement("div");
    bloque.style.marginBottom="15px";

    let titulo = document.createElement("p");
    titulo.innerText = p.pregunta;
    bloque.appendChild(titulo);

    p.opciones.forEach((opcion,i)=>{
      let label = document.createElement("label");
      label.style.display="block";

      label.innerHTML=`
        <input type="radio" name="preg${index}" value="${i}">
        ${opcion}
      `;

      bloque.appendChild(label);
    });

    contenedor.appendChild(bloque);
  });
}

document.addEventListener("submit", function(e){
  if(e.target.id==="formQuiz"){
    e.preventDefault();

    let puntaje=0;

    preguntas.forEach((p,index)=>{
      let opciones = document.querySelectorAll(`input[name="preg${index}"]`);
      let seleccion = document.querySelector(`input[name="preg${index}"]:checked`);

      opciones.forEach((op,i)=>{
        let label = op.parentElement;

        op.disabled = true; // bloquea cambios

        if(i === p.correcta){
          label.style.color = "green";
          label.style.fontWeight = "bold";
        }

        if(seleccion && parseInt(seleccion.value)===i && i !== p.correcta){
          label.style.color = "red";
        }
      });

      if(seleccion && parseInt(seleccion.value)===p.correcta){
        puntaje++;
      }
    });

    // GUARDAR NOTA
localStorage.setItem("notaSeccion5", puntaje + "/5");

    let resultado = document.getElementById("resultadoFinal");

    if(puntaje===5){
      resultado.innerHTML="🏆 Excelente! 5/5 respuestas correctas.";
    }else if(puntaje>=3){
      resultado.innerHTML=`👍 Bien hecho! ${puntaje}/5 correctas.`;
    }else{
      resultado.innerHTML=`📚 Necesitas repasar. ${puntaje}/5 correctas.`;
    }
  }
});




window.addEventListener("beforeunload", detenerAudio);

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    detenerAudio();
  }
});



mostrar();
</script>
